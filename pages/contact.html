  <div class="page-hero">
    <div class="container">
      <div class="section-tag">İletişim</div>
      <h1>Benimle İletişime Geç</h1>
    </div>
  </div>

  <section>
    <div class="container">
      <div class="contact-grid">

        <!-- Sol: Bilgiler -->
        <div class="reveal">
          <p class="section-desc">Proje iş birlikleri veya herhangi bir konu için bana ulaşabilirsin.</p>
          <div class="contact-links">
            <a href="mailto:efeozaslan1907@gmail.com" class="contact-link">
              <div class="contact-link-icon">✉</div>
              <span class="contact-link-text">efeozaslan1907@gmail.com</span>
            </a>
            <a href="https://github.com/ozaslanefe" target="_blank" class="contact-link">
              <div class="contact-link-icon" style="font-size:1rem;">⌥</div>
              <span class="contact-link-text">github.com/ozaslanefe</span>
            </a>
            <a href="https://www.linkedin.com/in/efeözaslan07" target="_blank" class="contact-link">
              <div class="contact-link-icon">in</div>
              <span class="contact-link-text">https://www.linkedin.com/in/efeözaslan07</span>
            </a>
          </div>
        </div>

        <!-- Sağ: Form -->
        <div class="reveal d2">
          <form id="contact-form">
            <div class="form-group">
              <label for="name">Adınız</label>
              <input id="name" type="text" placeholder="Adınız Soyadınız" required>
            </div>
            <div class="form-group">
              <label for="email">E-posta</label>
              <input id="email" type="email" placeholder="örnek@email.com" required>
            </div>
            <div class="form-group">
              <label for="message">Mesaj</label>
              <textarea id="message" placeholder="Merhaba..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Mesaj Gönder</button>
          </form>
        </div>

      </div>
    </div>
  </section>
